name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to release, for example v1.0.0
        required: false
        type: string
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: pubspec-build-bump-${{ github.event.repository.default_branch }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: read
  pull-requests: read

jobs:
  bump-build-number:
    runs-on: ubuntu-latest
    outputs:
      build_number: ${{ steps.bump.outputs.BUILD_NUMBER }}

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Bump pubspec build number
        id: bump
        shell: bash
        run: |
          set -euo pipefail

          VERSION_LINE="$(grep -E '^version:' pubspec.yaml | awk '{print $2}')"
          if [ -z "$VERSION_LINE" ]; then
            echo "Failed to read version from pubspec.yaml" >&2
            exit 1
          fi

          BASE_VERSION="${VERSION_LINE%%+*}"
          if [ "$BASE_VERSION" = "$VERSION_LINE" ]; then
            echo "pubspec.yaml version must include build number suffix (+N). Got: $VERSION_LINE" >&2
            exit 1
          fi

          BUILD_NUMBER="${VERSION_LINE##*+}"
          if ! [[ "$BUILD_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "Invalid build number in pubspec.yaml version: $VERSION_LINE" >&2
            exit 1
          fi

          NEXT_BUILD_NUMBER=$((BUILD_NUMBER + 1))
          NEXT_VERSION="${BASE_VERSION}+${NEXT_BUILD_NUMBER}"
          sed -i "s/^version: .*/version: ${NEXT_VERSION}/" pubspec.yaml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "chore: Bump build number to ${NEXT_BUILD_NUMBER}"
          git push origin "HEAD:${{ github.event.repository.default_branch }}"

          echo "BUILD_NUMBER=${NEXT_BUILD_NUMBER}" >> "$GITHUB_OUTPUT"

  create-release:
    needs: bump-build-number
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag_version.outputs.VERSION }}
      version_number: ${{ steps.tag_version.outputs.VERSION_NUMBER }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract tag version
        id: tag_version
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${{ github.event.inputs.tag || '' }}" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            echo "Manual release requires the tag input when not running from a tag ref." >&2
            exit 1
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "VERSION_NUMBER=${VERSION#v}" >> "$GITHUB_OUTPUT"

          VERSION_LINE="$(grep -E '^version:' pubspec.yaml | awk '{print $2}')"
          if [ -z "$VERSION_LINE" ]; then
            echo "Failed to read version from pubspec.yaml" >&2
            exit 1
          fi

          PUBSPEC_VERSION="${VERSION_LINE%%+*}"
          if [ "$PUBSPEC_VERSION" != "${VERSION#v}" ]; then
            echo "Tag version (${VERSION#v}) does not match pubspec version ($PUBSPEC_VERSION)." >&2
            exit 1
          fi

          PUBSPEC_BUILD_NUMBER="${VERSION_LINE##*+}"
          if ! [[ "$PUBSPEC_BUILD_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "Invalid build number in pubspec.yaml version: $VERSION_LINE" >&2
            exit 1
          fi

      - name: Prepare release notes
        shell: bash
        run: |
          set -euo pipefail

          if [ -s CHANGELOG.md ]; then
            cp CHANGELOG.md release-notes.md
          else
            echo "Release ${{ steps.tag_version.outputs.VERSION }}" > release-notes.md
          fi

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          tag: ${{ steps.tag_version.outputs.VERSION }}
          name: ${{ steps.tag_version.outputs.VERSION }}
          bodyFile: release-notes.md
          draft: false
          prerelease: ${{ contains(steps.tag_version.outputs.VERSION, 'beta') || contains(steps.tag_version.outputs.VERSION, 'alpha') || contains(steps.tag_version.outputs.VERSION, 'rc') }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify release created
        run: |
          echo "Successfully created release ${{ steps.tag_version.outputs.VERSION }}"
          echo "Release notes sourced from CHANGELOG.md when available"
          echo "Release URL: https://github.com/${{ github.repository }}/releases/tag/${{ steps.tag_version.outputs.VERSION }}"

  build-and-upload:
    needs:
      - bump-build-number
      - create-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Compute build metadata
        id: build_meta
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA="$(git rev-parse --short HEAD)"
          echo "BUILD_NAME=${{ needs.create-release.outputs.version_number }}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "BUILD_NUMBER=${{ needs.bump-build-number.outputs.build_number }}" >> "$GITHUB_OUTPUT"

      - name: Setup Android signing
        shell: bash
        run: |
          set -euxo pipefail
          test -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}"
          test -n "${{ secrets.ANDROID_STORE_PASSWORD }}"
          test -n "${{ secrets.ANDROID_KEY_ALIAS }}"
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/upload-keystore.jks
          {
            echo "storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}"
            echo "keyPassword=${{ secrets.ANDROID_STORE_PASSWORD }}"
            echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}"
            echo "storeFile=../upload-keystore.jks"
          } > android/key.properties
          keytool -list -v \
            -keystore android/upload-keystore.jks \
            -storepass "${{ secrets.ANDROID_STORE_PASSWORD }}" \
            -alias "${{ secrets.ANDROID_KEY_ALIAS }}" > /dev/null

      - name: Setup Android SDK components
        shell: bash
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          set -euxo pipefail
          SDKMANAGER="$(command -v sdkmanager || true)"
          if [ -z "$SDKMANAGER" ]; then
            SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          fi

          yes | "$SDKMANAGER" --licenses || true
          "$SDKMANAGER" \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;35.0.0" \
            "cmake;3.22.1" \
            "ndk;28.2.13676358"

      - name: Build APK
        run: flutter build apk --release --target-platform android-arm64 --build-name "${{ steps.build_meta.outputs.BUILD_NAME }}" --build-number "${{ steps.build_meta.outputs.BUILD_NUMBER }}" --obfuscate --split-debug-info=build/app/outputs/symbols --tree-shake-icons

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload release assets
        if: success()
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.create-release.outputs.version }}
          artifacts: build/app/outputs/flutter-apk/app-release.apk,build/app/outputs/bundle/release/app-release.aab
          allowUpdates: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify build completion
        run: |
          echo "Successfully built and uploaded release assets"
          echo "Release URL: https://github.com/${{ github.repository }}/releases/tag/${{ needs.create-release.outputs.version }}"

  build-ios-ipa:
    needs:
      - bump-build-number
      - create-release
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Compute build metadata
        id: build_meta
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA="$(git rev-parse --short HEAD)"
          echo "BUILD_NAME=${{ needs.create-release.outputs.version_number }}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "BUILD_NUMBER=${{ needs.bump-build-number.outputs.build_number }}" >> "$GITHUB_OUTPUT"

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          p12-password: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}

      - name: Install provisioning profile
        shell: bash
        run: |
          set -euo pipefail
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          PROFILE_PATH="$RUNNER_TEMP/appstore.mobileprovision"
          printf '%s' "${{ secrets.IOS_APPSTORE_PROFILE_BASE64 }}" | base64 --decode > "$PROFILE_PATH"
          UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin <<< "$(security cms -D -i "$PROFILE_PATH")")
          cp "$PROFILE_PATH" "$PROFILE_DIR/$UUID.mobileprovision"

      - name: Generate export options
        shell: bash
        run: |
          set -euo pipefail
          cat > ios/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${{ secrets.IOS_TEAM_ID }}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.stayup.schedule</key>
              <string>${{ secrets.IOS_APPSTORE_PROFILE_NAME }}</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Build signed IPA
        run: flutter build ipa --release --build-name "${{ steps.build_meta.outputs.BUILD_NAME }}" --build-number "${{ steps.build_meta.outputs.BUILD_NUMBER }}" --export-options-plist=ios/ExportOptions.plist

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-ipa
          path: build/ios/ipa/*.ipa

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: build/ios/ipa/*.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

  notify-completion:
    needs:
      - create-release
      - build-and-upload
      - build-ios-ipa
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Notify success
        if: needs.build-and-upload.result == 'success' && needs.build-ios-ipa.result == 'success'
        run: |
          echo "Release ${{ needs.create-release.outputs.version }} completed successfully"
          echo "All build artifacts have been uploaded"

      - name: Notify failure
        if: needs.build-and-upload.result == 'failure' || needs.build-ios-ipa.result == 'failure'
        run: |
          echo "Failed to complete release ${{ needs.create-release.outputs.version }}"
          echo "Please check the workflow logs for details"
